# PaperTrail 로컬 개발 인프라
#
# 기본 기동:   docker compose up -d          (postgres, redis, minio, clickhouse + 버킷 생성)
# Papermake:  docker compose --profile papermake up -d   (Rust 소스 빌드, 무거움)
#
# 값은 .env 로 덮어쓸 수 있으며, 없으면 아래 로컬 기본값을 사용한다.

services:
  postgres:
    image: postgres:17-alpine
    container_name: papertrail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-papertrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-papertrail}
      POSTGRES_DB: ${POSTGRES_DB:-papertrail}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-papertrail} -d ${POSTGRES_DB:-papertrail}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: papertrail-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: papertrail-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio-data:/data

  # MinIO 버킷 생성 (papertrail=우리 저장소, papermake=렌더 엔진 저장소)
  createbuckets:
    image: minio/mc:latest
    container_name: papertrail-createbuckets
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'minio 대기 중...'; sleep 2;
      done;
      mc mb --ignore-existing local/papertrail;
      mc mb --ignore-existing local/papermake;
      echo '버킷 준비 완료';
      "
    restart: 'no'

  clickhouse:
    image: clickhouse/clickhouse-server:25.3-alpine
    container_name: papertrail-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-papermake}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-papermake}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-papermake123}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: '1'
    ports:
      - '${CLICKHOUSE_HTTP_PORT:-8123}:8123'
      - '${CLICKHOUSE_NATIVE_PORT:-9009}:9000'
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./infra/clickhouse/init:/docker-entrypoint-initdb.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "clickhouse-client --user $${CLICKHOUSE_USER} --password $${CLICKHOUSE_PASSWORD} --query 'SELECT 1' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 15

  # 렌더 엔진. 공개 이미지가 없어 소스에서 빌드한다(무거우므로 profile 로 분리).
  #   git clone https://github.com/rkstgr/papermake third_party/papermake
  #   docker compose --profile papermake up -d
  papermake:
    build:
      context: ./third_party/papermake
      dockerfile: crates/papermake-server/Dockerfile
    container_name: papertrail-papermake
    profiles: ['papermake']
    restart: unless-stopped
    environment:
      HOST: '0.0.0.0'
      PORT: '3000'
      S3_ENDPOINT_URL: 'http://minio:9000'
      S3_REGION: 'us-east-1'
      S3_BUCKET: 'papermake'
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      CLICKHOUSE_URL: 'http://clickhouse:8123'
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB:-papermake}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-papermake}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-papermake123}
      RUST_LOG: 'papermake_server=debug,papermake_registry=debug'
    ports:
      - '${PAPERMAKE_PORT:-3100}:3000'
    depends_on:
      clickhouse:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
  minio-data:
  clickhouse-data:

# pnpm 워크스페이스 — 모노레포 구성
# apps: 배포 단위 (gateway=NestJS, worker=렌더 워커, admin=Next.js)
# packages: 공용 라이브러리 (contracts 등)
packages:
  - 'apps/*'
  - 'packages/*'

# 네이티브 바이너리를 설치 시 빌드하도록 허용할 의존성 (보안 기본값은 차단)
onlyBuiltDependencies:
  - '@swc/core'
  - 'esbuild'

# 빌드 스크립트 실행 여부를 명시적으로 결정한 의존성.
# msgpackr-extract(bullmq 의 선택적 네이티브 가속기)는 JS 폴백으로 동작하므로 빌드하지 않는다.
allowBuilds:
  msgpackr-extract: false
